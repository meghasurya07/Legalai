name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npx tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, type-check, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          # Provide dummy env vars for build (not real secrets)
          AUTH0_SECRET: ci-placeholder
          AUTH0_BASE_URL: http://localhost:3000
          AUTH0_ISSUER_BASE_URL: https://placeholder.auth0.com
          AUTH0_CLIENT_ID: ci-placeholder
          AUTH0_CLIENT_SECRET: ci-placeholder
          OPENAI_API_KEY: sk-placeholder
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_ANON_KEY: ci-placeholder
          PINECONE_API_KEY: ci-placeholder
          PINECONE_INDEX: ci-placeholder
